name: 🚀 LuxeDrive Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 SSH & Update Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}     # Add this in GitHub Secrets
          username: ${{ secrets.SERVER_USER }} # Add this in GitHub Secrets
          key: ${{ secrets.SERVER_SSH_KEY }}   # Add this in GitHub Secrets
          script: |
            set -e
            echo "📥 Syncing latest code from GitHub..."
            cd ~/luxe-drive
            git pull origin main

            echo "🏗️ Building Frontend (Deploying index.html changes)..."
            cd frontend
            npm install
            npm run build

            echo "📦 Updating Backend..."
            cd ../backend
            npm install --omit=dev

            echo "♻️ Restarting Processes..."
            pm2 restart all --update-env
            
            echo "✅ DEPLOYMENT SUCCESSFUL!"
